name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # В этом контейнере ВСЁ уже установлено и лицензии ПРИНЯТЫ
          buildozer android debug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
