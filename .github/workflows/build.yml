      - name: Build
        run: |
          # Создаем директорию для лицензий
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Устанавливаем переменные окружения для SDK
          export ANDROID_HOME=$HOME/.android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # ПРИНУДИТЕЛЬНОЕ ПРИНЯТИЕ ЛИЦЕНЗИЙ
          # Команда 'yes' бесконечно отправляет 'y' в sdkmanager
          mkdir -p $HOME/.android/sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/sdk/licenses/android-sdk-license
          echo "84835b5470d061247071f8456f9167e45214cc6d" >> $HOME/.android/sdk/licenses/android-sdk-license
          echo "504667f4c0de7af1a06de9f4b1727b84381393f9" >> $HOME/.android/sdk/licenses/android-sdk-license
          
          # Запуск сборки
          buildozer android debug
          
