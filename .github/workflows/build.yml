name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython
          
      - name: Build
        run: |
          # Создаем структуру для SDK
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Устанавливаем переменные окружения
          export PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/tools/bin
          
          # Принудительное принятие лицензий
          # Это обходит ошибку 'Accept? (y/N)'
          yes | sdkmanager --licenses || true
          
          # Запуск сборки
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
