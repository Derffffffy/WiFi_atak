name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython
      - name: Build
        run: |
          # Главная правка: создаем все нужные папки заранее
          mkdir -p .buildozer/android/platform/android-sdk/licenses
          
          # Запуск сборки
          # yes | sdkmanager --licenses перехватывает все запросы подтверждения
          buildozer android debug || (yes | sdkmanager --licenses && buildozer android debug)
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
