name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    env:
      BUILDOZER_ALLOW_ROOT: 1
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
