name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --upgrade buildozer cython

      - name: Build
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          # Создаем директорию для лицензий и принимаем их принудительно
          mkdir -p ~/.android/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
          echo "84835b5470d061247071f8456f9167e45214cc6d" >> ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7af1a06de9f4b1727b84381393f9" >> ~/.android/licenses/android-sdk-license
          
          # Запуск
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
