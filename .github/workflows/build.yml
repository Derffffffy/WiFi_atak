name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --upgrade buildozer cython

      - name: Build
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          # Создаем структуру для лицензий
          mkdir -p ~/.android/licenses
          # Принимаем все лицензии Android SDK
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
          echo "84835b5470d061247071f8456f9167e45214cc6d" >> ~/.android/licenses/android-sdk-license
          echo "d975f751659f77f0a996f26487e382d61483861c" >> ~/.android/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.android/licenses/android-sdk-license
          
          # Запуск сборки
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAtak-APK
          path: bin/*.apk
          
